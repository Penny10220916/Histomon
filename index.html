<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5.0, user-scalable=yes" />
    <title>史靈 GO！校園實境解謎</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
      /* 【升級】毛玻璃背景加上 opacity 漸變轉場，讓起霧的過程更自然 */
      #ui-layer { 
        display: none; opacity: 0; transition: opacity 0.5s ease-in-out;
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
        background: rgba(0, 0, 0, 0.65); backdrop-filter: blur(8px); z-index: 1000; 
        flex-direction: column; align-items: center; justify-content: center; 
      }
      .screen { display: none; flex-direction: column; align-items: center; text-align: center; color: white; width: 100%;}
      .screen.active { display: flex; animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

      @keyframes popIn {
        0% { transform: scale(0.8); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
      }

      /* 標題與圖卡樣式 */
      .game-title {
        font-size: 22px; color: #FFF; margin-bottom: 15px; width: 90%;
        text-shadow: 0 0 8px #4CAF50, 0 0 15px #4CAF50, 2px 2px 4px rgba(0,0,0,0.8);
        animation: pulse 1.5s infinite; 
      }
      @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.05); }
        100% { transform: scale(1); }
      }

      img.card { 
        max-width: 95vw; max-height: 55vh; object-fit: contain; margin-bottom: 20px; 
        filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
        touch-action: pan-x pan-y pinch-zoom; 
      }
      
      /* 3D 按鈕樣式 */
      .btn { 
        padding: 16px 30px; margin: 8px; width: 85%; max-width: 320px;
        background: linear-gradient(180deg, #FFD54F 0%, #FFB300 100%); 
        color: #5D4037; font-weight: 900; font-size: 22px; 
        border: 3px solid #FFF8E1; border-radius: 16px; cursor: pointer; 
        box-shadow: 0 6px 0 #FF8F00, 0 10px 15px rgba(0,0,0,0.4); 
        transition: all 0.1s ease;
      }
      .btn:active { transform: translateY(6px); box-shadow: 0 0px 0 #FF8F00, 0 4px 6px rgba(0,0,0,0.4); }
      .options-container { display: flex; flex-direction: column; align-items: center; gap: 5px; width: 100%; }

      /* 右上角圖鑑按鈕 */
      #pokedex-btn { 
        position: fixed; top: 20px; right: 20px; z-index: 2000; 
        background: linear-gradient(180deg, #66BB6A 0%, #43A047 100%); 
        color: white; border: 3px solid #E8F5E9; border-radius: 50px; 
        padding: 12px 20px; font-size: 16px; font-weight: bold; cursor: pointer; 
        box-shadow: 0 5px 0 #2E7D32, 0 8px 10px rgba(0,0,0,0.4); transition: all 0.1s;
      }
      #pokedex-btn:active { transform: translateY(5px); box-shadow: 0 0px 0 #2E7D32, 0 3px 5px rgba(0,0,0,0.4); }

      /* 圖鑑清單樣式 */
      .pokedex-grid { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; margin: 20px 0; max-height: 60vh; overflow-y: auto;}
      .sprite-item { background: rgba(255,255,255,0.2); padding: 15px; border-radius: 15px; border: 2px dashed #FFEB3B; backdrop-filter: blur(5px);}
      .sprite-item img { width: 80px; height: 80px; object-fit: contain; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.5));}
      .sprite-item p { margin: 10px 0 0 0; font-weight: bold; color: #FFFDE7; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); }
    </style>

    <script>
      document.addEventListener("DOMContentLoaded", function() {
        const uiLayer = document.querySelector('#ui-layer');
        const storyScreen = document.querySelector('#story-screen');
        const questionScreen = document.querySelector('#question-screen');
        const successScreen = document.querySelector('#success-screen');
        const pokedexScreen = document.querySelector('#pokedex-screen');

        const storyImg = document.querySelector('#story-img');
        const questionImg = document.querySelector('#question-img');
        const spriteImg = document.querySelector('#sprite-img');
        const successName = document.querySelector('#success-name');

        let currentHero = ""; 

        const heroData = {
          'locke': { answer: 'B', name: '洛克精靈' },
          'cai': { answer: 'C', name: '蔡元培精靈' } 
        };

        function hideAllScreens() {
          storyScreen.classList.remove('active');
          questionScreen.classList.remove('active');
          successScreen.classList.remove('active');
          pokedexScreen.classList.remove('active');
        }

        // 開啟介面並觸發漸變動畫
        function showUI() {
          uiLayer.style.display = "flex";
          // 延遲一點點時間觸發 CSS 漸變效果
          setTimeout(() => { uiLayer.style.opacity = "1"; }, 10);
        }

        function triggerHero(heroId) {
          currentHero = heroId;
          storyImg.src = heroId + "_story.png";
          questionImg.src = heroId + "_question.png";
          spriteImg.src = heroId + "_sprite.png";
          successName.innerText = "🎉 成功收服" + heroData[heroId].name + "！";
          
          hideAllScreens();
          showUI();
          storyScreen.classList.add('active');
        }

        document.querySelector('#locke-target').addEventListener("targetFound", () => triggerHero('locke'));
        document.querySelector('#cai-target').addEventListener("targetFound", () => triggerHero('cai'));

        window.goToQuestion = function() {
          hideAllScreens();
          questionScreen.classList.add('active');
        };

        window.checkAnswer = function(answer) {
          if (answer === heroData[currentHero].answer) {
            hideAllScreens();
            successScreen.classList.add('active');
            localStorage.setItem('has_' + currentHero, 'true');
          } else {
            alert("❌ 哎呀，精靈逃跑了！\n\n請重新閱讀知識點並再試一次吧！");
          }
        };

        window.openPokedex = function() {
          hideAllScreens();
          showUI();
          pokedexScreen.classList.add('active');
          
          const grid = document.querySelector('.pokedex-grid');
          grid.innerHTML = ''; 
          
          let hasAny = false;
          if (localStorage.getItem('has_locke') === 'true') {
            grid.innerHTML += `<div class="sprite-item"><img src="locke_sprite.png"><p>洛克精靈</p></div>`;
            hasAny = true;
          }
          if (localStorage.getItem('has_cai') === 'true') {
            grid.innerHTML += `<div class="sprite-item"><img src="cai_sprite.png"><p>蔡元培精靈</p></div>`;
            hasAny = true;
          }

          if (!hasAny) {
            grid.innerHTML = '<p style="color: #ccc;">尚未收集到任何歷史精靈，快去探索校園吧！</p>';
          }
        };

        // 關閉介面：先變透明，再隱藏
        window.closeUI = function() {
          uiLayer.style.opacity = "0";
          setTimeout(() => {
            uiLayer.style.display = "none";
            hideAllScreens();
          }, 500); // 等待0.5秒漸變結束
        };
      });
    </script>
  </head>

  <body>
    <button id="pokedex-btn" onclick="openPokedex()">🎒 圖鑑</button>

    <div id="ui-layer">
      <div id="story-screen" class="screen">
        <h3 class="game-title">📖 請先閱讀精靈小知識再開始挑戰！</h3>
        <img id="story-img" src="" class="card" alt="歷史小知識">
        <button class="btn" onclick="goToQuestion()">開始挑戰 ⚔️</button>
      </div>

      <div id="question-screen" class="screen">
        <h3 class="game-title" style="color:#FFC107; text-shadow: 0 0 10px #FF9800;">🔍 歷史獸挑戰</h3>
        <img id="question-img" src="" class="card" alt="歷史獸挑戰">
        <div class="options-container">
          <button class="btn" onclick="checkAnswer('A')">選 (A)</button>
          <button class="btn" onclick="checkAnswer('B')">選 (B)</button>
          <button class="btn" onclick="checkAnswer('C')">選 (C)</button>
        </div>
      </div>

      <div id="success-screen" class="screen">
        <h2 id="success-name" style="color: #FFEB3B; text-shadow: 2px 2px 4px #000, 0 0 20px #FFC107;"></h2>
        <img id="sprite-img" src="" class="card" alt="精靈圖" style="transform: scale(1.2); margin: 30px 0;">
        <button class="btn" style="background: linear-gradient(180deg, #4DD0E1 0%, #00ACC1 100%); box-shadow: 0 6px 0 #00838F;" onclick="closeUI()">繼續探索 🗺️</button>
      </div>

      <div id="pokedex-screen" class="screen">
        <h2 style="text-shadow: 2px 2px 4px #000;">📖 歷史精靈圖鑑</h2>
        <div class="pokedex-grid"></div>
        <button class="btn" style="background: linear-gradient(180deg, #e57373 0%, #f44336 100%); box-shadow: 0 6px 0 #c62828;" onclick="closeUI()">關閉圖鑑 ✖️</button>
      </div>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity mindar-image-target="targetIndex: 0" id="locke-target"></a-entity>
      <a-entity mindar-image-target="targetIndex: 1" id="cai-target"></a-entity>
    </a-scene>
  </body>
</html>
