<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>史靈 GO！洛克關卡</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <script>
      // 這是負責「點擊換頁」的全新 JavaScript 程式碼 (全螢幕觸控版)
      AFRAME.registerComponent('card-switcher', {
        init: function () {
          let currentCard = 1; // 1 代表故事卡，2 代表題目卡
          const el = this.el;

          // 改為監聽「整個手機螢幕(window)」的點擊事件
          window.addEventListener('click', function () {
            if (currentCard === 1) {
              // 切換成題目卡
              el.setAttribute('src', '#questionCard');
              currentCard = 2;
            } else {
              // 切換回故事卡 (讓學生可以反覆觀看)
              el.setAttribute('src', '#storyCard');
              currentCard = 1;
            }
          });
        }
      });
    </script>
  </head>

  <body>
    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <img id="storyCard" src="./story.png" />
        <img id="questionCard" src="./question.png" />
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-image id="displayCard" src="#storyCard" card-switcher position="0 0 0" height="1.2" width="0.9"></a-image>
      </a-entity>

    </a-scene>
  </body>
</html>
