<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>史靈 GO！洛克關卡</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
      /* 浮動介面層 (預設隱藏) */
      #ui-layer {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.85); z-index: 1000;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
      }
      
      .screen { display: none; flex-direction: column; align-items: center; text-align: center; color: white;}
      .screen.active { display: flex; }

      /* 【放大版】圖卡與按鈕樣式 */
      img.card { max-width: 95vw; max-height: 65vh; object-fit: contain; margin-bottom: 20px; }
      .btn { padding: 16px 30px; margin: 5px; background: #FFC107; color: #333; font-weight: bold; border: none; border-radius: 12px; font-size: 22px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); width: 80%; max-width: 300px;}
      .btn:active { transform: scale(0.95); }
      
      /* 【直排版】選項容器 */
      .options-container { display: flex; flex-direction: column; align-items: center; gap: 12px; width: 100%; }

      /* 圖鑑專屬樣式 */
      #pokedex-btn {
        position: fixed; top: 20px; right: 20px; z-index: 2000;
        background: #4CAF50; color: white; border: 2px solid white; border-radius: 50px; padding: 10px 15px; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.5);
      }
      .pokedex-grid { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; margin: 20px 0; }
      .sprite-item { background: rgba(255,255,255,0.2); padding: 15px; border-radius: 15px; border: 2px dashed #FFEB3B; }
      .sprite-item img { width: 80px; height: 80px; object-fit: contain; }
      .sprite-item p { margin: 5px 0 0 0; font-weight: bold; color: #FFEB3B; }
    </style>

    <script>
      document.addEventListener("DOMContentLoaded", function() {
        const lockeTarget = document.querySelector('#locke-target');
        const uiLayer = document.querySelector('#ui-layer');
        const storyScreen = document.querySelector('#story-screen');
        const questionScreen = document.querySelector('#question-screen');
        const successScreen = document.querySelector('#success-screen');
        const pokedexScreen = document.querySelector('#pokedex-screen');

        // 隱藏所有畫面
        function hideAllScreens() {
          storyScreen.classList.remove('active');
          questionScreen.classList.remove('active');
          successScreen.classList.remove('active');
          pokedexScreen.classList.remove('active');
        }

        // 當相機找到洛克畫像
        lockeTarget.addEventListener("targetFound", event => {
          hideAllScreens();
          uiLayer.style.display = "flex";
          storyScreen.classList.add('active');
        });

        // 切換到題目
        window.goToQuestion = function() {
          hideAllScreens();
          questionScreen.classList.add('active');
        };

        // 檢查答案機制
        window.checkAnswer = function(answer) {
          if (answer === 'B') {
            hideAllScreens();
            successScreen.classList.add('active');
            // 【圖鑑魔法】答對時，存入記憶卡！
            localStorage.setItem('hasLocke', 'true');
          } else {
            alert("❌ 哎呀，精靈逃跑了！\n\n【洛克精靈的提示】：\n知識是『後天經驗』寫上去的，禮儀也是需要學習來改變原本固執的氣質喔！請再試一次吧！");
          }
        };

        // 打開圖鑑
        window.openPokedex = function() {
          hideAllScreens();
          uiLayer.style.display = "flex";
          pokedexScreen.classList.add('active');
          
          const grid = document.querySelector('.pokedex-grid');
          grid.innerHTML = ''; 
          
          if (localStorage.getItem('hasLocke') === 'true') {
            grid.innerHTML = `
              <div class="sprite-item">
                <img src="locke_sprite.png" alt="洛克精靈">
                <p>洛克精靈</p>
              </div>`;
          } else {
            grid.innerHTML = '<p style="color: #ccc;">尚未收集到任何歷史精靈，快去探索校園吧！</p>';
          }
        };

        // 關閉介面
        window.closeUI = function() {
          uiLayer.style.display = "none";
          hideAllScreens();
        };
      });
    </script>
  </head>

  <body>
    <button id="pokedex-btn" onclick="openPokedex()">🎒 圖鑑</button>

    <div id="ui-layer" style="display: none;">
      
      <div id="story-screen" class="screen">
        <img src="locke_story.png" class="card" alt="洛克小知識">
        <button class="btn" onclick="goToQuestion()">開始挑戰</button>
      </div>

      <div id="question-screen" class="screen">
        <img src="locke_question.png" class="card" alt="歷史獸挑戰">
        <div class="options-container">
          <button class="btn" onclick="checkAnswer('A')">選 (A)</button>
          <button class="btn" onclick="checkAnswer('B')">選 (B)</button>
          <button class="btn" onclick="checkAnswer('C')">選 (C)</button>
        </div>
      </div>

      <div id="success-screen" class="screen">
        <h2 style="color: #FFEB3B; text-shadow: 2px 2px 4px #000;">🎉 成功收服洛克精靈！</h2>
        <img src="locke_sprite.png" class="card" alt="洛克小精靈">
        <p>「白板論」知識點數 +10 點</p>
        <button class="btn" onclick="closeUI()">回到相機繼續探索</button>
      </div>

      <div id="pokedex-screen" class="screen">
        <h2>📖 歷史精靈圖鑑</h2>
        <div class="pokedex-grid"></div>
        <button class="btn" onclick="closeUI()">關閉圖鑑</button>
      </div>

    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity mindar-image-target="targetIndex: 0" id="locke-target"></a-entity>
    </a-scene>
  </body>
</html>
