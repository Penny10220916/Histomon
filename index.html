<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5.0, user-scalable=yes" />
    <title>史靈 GO！校園實境解謎</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
      /* 基礎與背景設定 */
      #ui-layer { 
        display: none; opacity: 0; transition: opacity 0.5s ease-in-out;
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
        background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px); z-index: 1000; 
        flex-direction: column; align-items: center; justify-content: center; 
      }
      .screen { display: none; flex-direction: column; align-items: center; text-align: center; color: white; width: 100%; height: 100%; overflow-y: auto;}
      .screen.active { display: flex; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

      @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

      .game-title { font-size: 22px; color: #FFF; margin-bottom: 15px; width: 90%; text-shadow: 0 0 8px #4CAF50, 0 0 15px #4CAF50, 2px 2px 4px rgba(0,0,0,0.8); animation: pulse 1.5s infinite; }
      @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

      img.card { max-width: 95vw; max-height: 55vh; object-fit: contain; margin-bottom: 20px; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5)); touch-action: pan-x pan-y pinch-zoom; }
      
      .btn { 
        padding: 16px 30px; margin: 8px; width: 85%; max-width: 320px;
        background: linear-gradient(180deg, #FFD54F 0%, #FFB300 100%); color: #5D4037; font-weight: 900; font-size: 22px; 
        border: 3px solid #FFF8E1; border-radius: 16px; cursor: pointer; box-shadow: 0 6px 0 #FF8F00, 0 10px 15px rgba(0,0,0,0.4); transition: all 0.1s ease; flex-shrink: 0;
      }
      .btn:active { transform: translateY(6px); box-shadow: 0 0px 0 #FF8F00, 0 4px 6px rgba(0,0,0,0.4); }
      .options-container { display: flex; flex-direction: column; align-items: center; gap: 5px; width: 100%; }

      #pokedex-btn { position: fixed; top: 20px; right: 20px; z-index: 2000; background: linear-gradient(180deg, #66BB6A 0%, #43A047 100%); color: white; border: 3px solid #E8F5E9; border-radius: 50px; padding: 12px 20px; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 0 #2E7D32, 0 8px 10px rgba(0,0,0,0.4); transition: all 0.1s;}
      #pokedex-btn:active { transform: translateY(5px); box-shadow: 0 0px 0 #2E7D32, 0 3px 5px rgba(0,0,0,0.4); }

      /* 史詩級手遊卡牌圖鑑專區 */
      .pokedex-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 90%; max-width: 450px; margin: auto; max-height: 70vh; overflow-y: auto; padding: 20px 0; }
      .gacha-card { position: relative; width: 100%; aspect-ratio: 3 / 4; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; box-shadow: 0 8px 15px rgba(0,0,0,0.6); transition: transform 0.1s;}
      .gacha-card.unlocked { background: radial-gradient(circle at top, #3A1C71 0%, #1A237E 100%); border: 3px solid #FFD700; cursor: pointer; }
      .gacha-card.unlocked:active { transform: scale(0.95); }
      .gacha-card.unlocked img { position: absolute; top: 10%; width: 85%; height: 70%; object-fit: contain; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.8)); }
      .name-plate { width: 100%; background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%); padding: 15px 0 8px 0; z-index: 2; border-top: 1px solid rgba(255, 215, 0, 0.4); }
      .name-plate p { margin: 0; font-weight: 900; font-size: 16px; color: #FFFDE7; text-shadow: 1px 1px 3px #000; letter-spacing: 1px;}
      .attr-badge { position: absolute; top: 6px; left: 6px; width: 32px; height: 32px; border-radius: 50%; border: 2px solid #FFD700; box-shadow: 0 2px 5px rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; color: #FFF; z-index: 3; text-shadow: 1px 1px 2px #000; }
      .gacha-card.locked { background: radial-gradient(circle at center, #263238 0%, #101416 100%); border: 3px solid #90A4AE; justify-content: center; cursor: not-allowed;}
      .gacha-card.locked::before { content: ''; position: absolute; width: 80%; height: 80%; border: 2px dashed rgba(144, 164, 174, 0.2); border-radius: 10px; }
      .lock-icon { font-size: 40px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.3)); z-index: 2; margin-bottom: 10px;}
      .locked-text { font-size: 14px; color: #90A4AE; font-weight: bold; letter-spacing: 2px; z-index: 2;}

      /* =========================================
         🌟 終極 A 方案：上下排版＋雙層魔法陣＋羊皮紙底板
         ========================================= */
      
      /* 設定 CSS 變數，用於客製化角色特效顏色 */
      #details-screen { --hero-color: #FFD700; justify-content: flex-start; overflow-x: hidden;}

      /* 上半部：魔法陣與發光粒子空間 */
      #magic-bg {
        position: absolute; top: 0; left: 0; width: 100%; height: 55vh; 
        overflow: hidden; z-index: 0; pointer-events: none;
        background: radial-gradient(circle at center, rgba(0,0,0,0) 0%, rgba(0,0,0,0.6) 100%);
      }

      /* 魔法陣外圈 (順時針) */
      .magic-circle.outer {
        position: absolute; top: 40%; left: 50%; width: 300px; height: 300px;
        margin-left: -150px; margin-top: -150px; border-radius: 50%;
        border: 2px dashed var(--hero-color); box-shadow: 0 0 30px var(--hero-color), inset 0 0 20px var(--hero-color);
        opacity: 0.5; animation: spinCw 15s linear infinite;
      }
      /* 魔法陣內圈 (逆時針) */
      .magic-circle.inner {
        position: absolute; top: 40%; left: 50%; width: 220px; height: 220px;
        margin-left: -110px; margin-top: -110px; border-radius: 50%;
        border: 4px dotted var(--hero-color); opacity: 0.7;
        animation: spinCcw 10s linear infinite;
      }
      @keyframes spinCw { to { transform: rotate(360deg); } }
      @keyframes spinCcw { to { transform: rotate(-360deg); } }

      /* 發光粒子特效 */
      .particle {
        position: absolute; bottom: -20px; width: 6px; height: 6px; border-radius: 50%;
        background: #FFF; box-shadow: 0 0 15px 4px var(--hero-color); opacity: 0;
      }
      .p1 { left: 20%; animation: floatUp 4s 0s infinite ease-in; }
      .p2 { left: 50%; animation: floatUp 5s 1s infinite ease-in; }
      .p3 { left: 80%; animation: floatUp 3.5s 0.5s infinite ease-in; }
      .p4 { left: 35%; animation: floatUp 4.5s 2s infinite ease-in; }
      .p5 { left: 70%; animation: floatUp 6s 1.5s infinite ease-in; }
      @keyframes floatUp {
        0% { transform: translateY(0) scale(0.5); opacity: 0; }
        50% { opacity: 0.8; }
        100% { transform: translateY(-40vh) scale(1.5); opacity: 0; }
      }

      /* 破框大立繪：Q彈降落＋呼吸漂浮 */
      #detail-img-full {
        width: 130%; max-width: 450px; height: 45vh; object-fit: contain; object-position: bottom;
        z-index: 10; margin-top: 5vh; margin-bottom: -35px; /* 負邊距製造破框感 */
        filter: drop-shadow(0 15px 25px rgba(0,0,0,0.8));
      }
      
      @keyframes dropInBounce {
        0% { transform: translateY(-50vh) scale(0.5); opacity: 0; }
        60% { transform: translateY(20px) scale(1.05); opacity: 1; }
        80% { transform: translateY(-10px) scale(0.98); }
        100% { transform: translateY(0) scale(1); opacity: 1; }
      }
      @keyframes floatBreath {
        0%, 100% { transform: translateY(0) scale(1); }
        50% { transform: translateY(-15px) scale(1.02); }
      }

      /* 下半部：深色皮革底板 */
      .scroll-board {
        background: #3e2723; border: 3px solid #28140c; border-radius: 12px;
        box-shadow: inset 0 0 30px #000, 0 20px 30px rgba(0,0,0,0.8);
        width: 90%; max-width: 450px; padding: 12px; z-index: 5; margin-bottom: 20px;
        position: relative;
      }
      /* 金屬包角裝飾 (左上右上) */
      .scroll-board::before, .scroll-board::after {
        content: ''; position: absolute; top: -2px; width: 25px; height: 25px; 
        border: 4px solid #FFD700; box-shadow: 0 2px 5px rgba(0,0,0,0.5);
      }
      .scroll-board::before { left: -2px; border-right: none; border-bottom: none; border-radius: 12px 0 0 0; }
      .scroll-board::after { right: -2px; border-left: none; border-bottom: none; border-radius: 0 12px 0 0; }

      /* 破損捲曲邊緣的羊皮紙 */
      .parchment-paper {
        background: linear-gradient(135deg, #fdf6e3 0%, #f1e0c5 40%, #e3c79e 100%);
        /* 不對稱的 border-radius 營造破舊捲曲的紙張感 */
        border-radius: 3px 25px 5px 20px; 
        box-shadow: inset 0 0 20px rgba(93, 64, 55, 0.4), 0 5px 10px rgba(0,0,0,0.5);
        border: 1px solid rgba(93, 64, 55, 0.3); padding: 30px 20px 20px 20px;
        text-align: center;
      }

      #detail-name { color: #3E2723; font-size: 26px; font-weight: 900; border-bottom: 2px dashed #8D6E63; padding-bottom: 10px; margin-top: 0; margin-bottom: 15px;}
      #detail-title { background: #5D4037; color: #FFF; padding: 5px 15px; border-radius: 20px; font-size: 14px; font-weight: bold; box-shadow: 0 3px 6px rgba(0,0,0,0.4);}
      
      .detail-info-box { text-align: left; margin-top: 20px; font-size: 15px; line-height: 1.6;}
      #detail-desc { color: #3E2723; font-weight: bold; margin-top: 0; text-align: justify;}
      #detail-extra { color: #5D4037; margin-bottom: 0;}
    </style>

    <script>
      document.addEventListener("DOMContentLoaded", function() {
        const uiLayer = document.querySelector('#ui-layer');
        const storyScreen = document.querySelector('#story-screen');
        const questionScreen = document.querySelector('#question-screen');
        const successScreen = document.querySelector('#success-screen');
        const pokedexScreen = document.querySelector('#pokedex-screen');
        const detailsScreen = document.querySelector('#details-screen'); 
        const hintScreen = document.querySelector('#hint-screen'); 

        const storyImg = document.querySelector('#story-img');
        const questionImg = document.querySelector('#question-img');
        const spriteImg = document.querySelector('#sprite-img');
        const successName = document.querySelector('#success-name');

        let currentHero = ""; 

        // 🌟 偉人資料庫 (badgeColor 決定了魔法陣的顏色！)
        const heroData = {
          'locke': { 
            answer: 'B', name: '洛克精靈', badge: '哲', badgeColor: '#9C27B0', 
            title: '經驗主義之父', desc: '出生時的心靈就像一塊「白板」，知識都是靠後天經驗與感官學習寫上去的！', 
            extra: '✨ <b>隱藏知識：</b><br>1. 提倡「紳士教育」，強調品德重於學問。<br>2. 名言：「健全的心智寓於健康的身體」。', 
            hint: '洛克認為知識是「後天經驗」寫上去的，所以禮儀也是需要後天學習，才能改變原本固執的氣質喔！'
          },
          'cai': { 
            answer: 'C', name: '蔡元培精靈', badge: '教', badgeColor: '#4CAF50', 
            title: '北大永遠的校長', desc: '大學應該是研究高深學問的地方，對於各種不同的學派，都應秉持「兼容並包」的態度！', 
            extra: '✨ <b>隱藏知識：</b><br>1. 提倡「五育並重」（德智體群美）。<br>2. 提出「以美育代宗教」，認為美感能陶冶高尚情操。', 
            hint: '蔡元培校長最強調「兼容並包」，也就是要能接納、鼓勵各種不同的聲音和社團發展喔！'
          } 
        };

        const pokedexSlots = ['locke', 'cai', 'slot3', 'slot4', 'slot5', 'slot6'];

        function hideAllScreens() {
          storyScreen.classList.remove('active');
          questionScreen.classList.remove('active');
          successScreen.classList.remove('active');
          pokedexScreen.classList.remove('active');
          detailsScreen.classList.remove('active');
          hintScreen.classList.remove('active'); 
        }

        function showUI() {
          uiLayer.style.display = "flex";
          setTimeout(() => { uiLayer.style.opacity = "1"; }, 10);
        }

        function triggerHero(heroId) {
          currentHero = heroId;
          storyImg.src = heroId + "_story.png";
          questionImg.src = heroId + "_question.png";
          spriteImg.src = heroId + "_sprite.png";
          successName.innerText = "🎉 成功收服" + heroData[heroId].name + "！";
          
          hideAllScreens();
          showUI();
          storyScreen.classList.add('active');
        }

        document.querySelector('#locke-target').addEventListener("targetFound", () => triggerHero('locke'));
        document.querySelector('#cai-target').addEventListener("targetFound", () => triggerHero('cai'));

        window.goToQuestion = function() { hideAllScreens(); questionScreen.classList.add('active'); };

        window.checkAnswer = function(answer) {
          if (answer === heroData[currentHero].answer) {
            hideAllScreens();
            successScreen.classList.add('active');
            localStorage.setItem('has_' + currentHero, 'true');
          } else {
            hideAllScreens();
            document.querySelector('#hint-hero-img').src = currentHero + "_sprite.png"; 
            document.querySelector('#hint-text').innerText = heroData[currentHero].hint; 
            hintScreen.classList.add('active');
          }
        };

        window.openPokedex = function() {
          hideAllScreens();
          showUI();
          pokedexScreen.classList.add('active');
          
          const grid = document.querySelector('.pokedex-grid');
          let gridHTML = ''; 
          
          pokedexSlots.forEach(id => {
            if (heroData[id] && localStorage.getItem('has_' + id) === 'true') {
              gridHTML += `
                <div class="gacha-card unlocked" onclick="showDetails('${id}')">
                  <div class="attr-badge" style="background: ${heroData[id].badgeColor};">${heroData[id].badge}</div>
                  <img src="${id}_sprite.png" alt="${heroData[id].name}">
                  <div class="name-plate"><p>${heroData[id].name}</p></div>
                </div>`;
            } else {
              gridHTML += `<div class="gacha-card locked"><div class="lock-icon">🔒</div><div class="locked-text">尚未解鎖</div></div>`;
            }
          });
          
          grid.innerHTML = gridHTML;
        };

        // 🌟 核心升級：客製化特效顏色與動態出招動畫
        window.showDetails = function(heroId) {
          hideAllScreens();
          
          // 1. 將畫面的特效顏色，變成角色的專屬顏色 (魔法陣跟粒子都會變色！)
          detailsScreen.style.setProperty('--hero-color', heroData[heroId].badgeColor);

          // 2. 填入文字資料
          document.querySelector('#detail-name').innerText = heroData[heroId].name;
          document.querySelector('#detail-title').innerText = heroData[heroId].title;
          document.querySelector('#detail-desc').innerHTML = heroData[heroId].desc;
          document.querySelector('#detail-extra').innerHTML = heroData[heroId].extra;
          
          // 3. 讀取大尺寸立繪，並重啟 Q彈降落與呼吸動畫
          const splashImg = document.querySelector('#detail-img-full');
          splashImg.src = heroId + "_full.png";
          splashImg.style.animation = 'none'; // 先暫停舊動畫
          splashImg.offsetHeight; // 強制瀏覽器重繪
          // 加入降落與無限呼吸動畫
          splashImg.style.animation = 'dropInBounce 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, floatBreath 3s 0.8s infinite ease-in-out forwards';
          
          detailsScreen.classList.add('active');
        };

        window.closeUI = function() {
          uiLayer.style.opacity = "0";
          setTimeout(() => { uiLayer.style.display = "none"; hideAllScreens(); }, 500); 
        };
      });
    </script>
  </head>

  <body>
    <button id="pokedex-btn" onclick="openPokedex()">🎒 圖鑑</button>

    <div id="ui-layer">
      <div id="story-screen" class="screen">
        <div style="flex:1;"></div>
        <h3 class="game-title">📖 請先閱讀精靈小知識再開始挑戰！</h3>
        <img id="story-img" src="" class="card" alt="歷史小知識">
        <button class="btn" onclick="goToQuestion()">開始挑戰 ⚔️</button>
        <div style="flex:1;"></div>
      </div>

      <div id="question-screen" class="screen">
        <div style="flex:1;"></div>
        <h3 class="game-title" style="color:#FFC107; text-shadow: 0 0 10px #FF9800;">🔍 歷史獸挑戰</h3>
        <img id="question-img" src="" class="card" alt="歷史獸挑戰">
        <div class="options-container">
          <button class="btn" onclick="checkAnswer('A')">選 (A)</button>
          <button class="btn" onclick="checkAnswer('B')">選 (B)</button>
          <button class="btn" onclick="checkAnswer('C')">選 (C)</button>
        </div>
        <div style="flex:1;"></div>
      </div>

      <div id="success-screen" class="screen">
        <div style="flex:1;"></div>
        <h2 id="success-name" style="color: #FFEB3B; text-shadow: 2px 2px 4px #000, 0 0 20px #FFC107; font-size: 28px;"></h2>
        <img id="sprite-img" src="" class="card" alt="精靈圖">
        <button class="btn" style="background: linear-gradient(180deg, #4DD0E1 0%, #00ACC1 100%); box-shadow: 0 6px 0 #00838F;" onclick="closeUI()">繼續探索 🗺️</button>
        <button class="btn" style="background: linear-gradient(180deg, #66BB6A 0%, #43A047 100%); box-shadow: 0 6px 0 #2E7D32; font-size: 18px; margin-top:15px;" onclick="openPokedex()">查看圖鑑</button>
        <div style="flex:1;"></div>
      </div>

      <div id="pokedex-screen" class="screen">
        <h2 style="text-shadow: 2px 2px 4px #000; font-size: 26px; margin: 20px 0 5px 0;">📖 歷史精靈圖鑑</h2>
        <p style="color: #FFFDE7; font-size: 15px; margin-top:0;">點擊精靈查看詳細隱藏知識！</p>
        <div class="pokedex-grid"></div>
        <button class="btn" style="background: linear-gradient(180deg, #e57373 0%, #f44336 100%); box-shadow: 0 6px 0 #c62828; margin-bottom: 30px;" onclick="closeUI()">關閉圖鑑 ✖️</button>
      </div>

      <div id="details-screen" class="screen">
        
        <div id="magic-bg">
          <div class="magic-circle outer"></div>
          <div class="magic-circle inner"></div>
          <div class="particle p1"></div>
          <div class="particle p2"></div>
          <div class="particle p3"></div>
          <div class="particle p4"></div>
          <div class="particle p5"></div>
        </div>
        
        <img id="detail-img-full" src="" alt="全身立繪">
        
        <div class="scroll-board">
          <div class="parchment-paper">
            <h2 id="detail-name"></h2>
            <span id="detail-title"></span>
            <div class="detail-info-box">
              <p id="detail-desc"></p>
              <hr style="border: 0; border-top: 2px dotted rgba(141, 110, 99, 0.4); margin: 15px 0;">
              <p id="detail-extra"></p>
            </div>
          </div>
        </div>

        <button class="btn" style="background: linear-gradient(180deg, #9E9E9E 0%, #757575 100%); box-shadow: 0 6px 0 #424242; z-index: 30; margin-bottom: 30px;" onclick="openPokedex()">返回圖鑑 ↩️</button>
      </div>

      <div id="hint-screen" class="screen">
        <div style="flex:1;"></div>
        <h2 style="color: #FFCDD2; text-shadow: 2px 2px 4px #000; margin-bottom: 5px;">❌ 哎呀，精靈躲起來了！</h2>
        <p style="color: #FFEB3B; font-size: 16px; margin-top: 0;">別灰心，看看精靈留下的線索：</p>
        <img id="hint-hero-img" src="" style="width: 120px; height: 120px; object-fit: contain; filter: grayscale(100%) drop-shadow(0 5px 5px rgba(0,0,0,0.8)); margin-bottom: 15px;">
        <div style="background: rgba(244, 67, 54, 0.2); border: 1px solid rgba(244, 67, 54, 0.5); padding: 18px; border-radius: 12px; width: 85%; max-width: 320px; margin-bottom: 20px;">
          <p id="hint-text" style="color: #FFF; font-size: 18px; font-weight: bold; margin: 0; line-height: 1.5;"></p>
        </div>
        <button class="btn" style="background: linear-gradient(180deg, #FF9800 0%, #F57C00 100%); box-shadow: 0 6px 0 #E65100;" onclick="goToQuestion()">再試一次 🔄</button>
        <div style="flex:1;"></div>
      </div>

    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity mindar-image-target="targetIndex: 0" id="locke-target"></a-entity>
      <a-entity mindar-image-target="targetIndex: 1" id="cai-target"></a-entity>
    </a-scene>
  </body>
</html>
